server:
  port: 8080

spring:
  application:
    name: gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/finflow-local}
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:19006"
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
            allowedMethods: [GET, POST, PATCH, OPTIONS]
            allowedHeaders: ["*"]
            exposedHeaders: ["X-Correlation-Id"]
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/users/**
        - id: kyc-service
          uri: ${KYC_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/kyc/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
